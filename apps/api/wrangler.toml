name = "leetarena-api"
main = "src/index.ts"
compatibility_date = "2024-04-15"
compatibility_flags = ["nodejs_compat"]

[vars]
# Non-secret runtime vars (kept in source for reproducible deploys)
FRONTEND_URL = "https://leetarena-io.vercel.app"
LEETCODE_SYNC_ENABLED = "true"
LEETCODE_EXTENDED_SYNC_ENABLED = "true"

# Secrets should be set in the Cloudflare dashboard or via `wrangler secret put`
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# UPSTASH_REDIS_REST_URL
# UPSTASH_REDIS_REST_TOKEN
# QSTASH_TOKEN
# RESEND_API_KEY


[triggers]
crons = ["0 0 * * *", "30 0 * * *"]
